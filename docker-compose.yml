version: '3.8'

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      # Map the SQLite DB and ML models so they persist across container restarts
      - ./llm_eval.db:/app/llm_eval.db
      - ./data:/app/data
    ports:
      - "8000:8000"
    env_file:
      - .env

  dashboard:
    build: .
    command: streamlit run app/visualization/dashboard.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
      - ./llm_eval.db:/app/llm_eval.db
      - ./data:/app/data
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
